- name: deployment_name
  value: litellm
  default: litellm
  description: "Name of the deployment job"
  
- name: replicas
  value: "1"
  default: "1"
  description: "Number of replicas to deploy"

- name: master_key
  value: "sk-XXX"
  default: "sk-1234"
  description: ""

- name: salt_key
  value: "sk-987654321"
  default: "sk-1234567890"
  description: ""

- name: disable_admin_ui
  value: "False"
  default: "False"
  description: ""

- name: ui_username
  value: "admin"
  default: "admin"
  editable: true
  required: false
  description: ""

- name: ui_password
  value: "XXX"
  default: "mypassword"
  editable: true
  required: false
  description: ""

- name: external_postgreSQL_url
  value: "postgresql://doadmin:XXXXXXX@cogen-litellm-do-user-14127040-0.g.db.ondigitalocean.com:25060/litellm?sslmode=require"
  default: ""
  editable: true
  required: false
  description: "Connect to external DB instead of deploying a local DB (of the form 'postgres://<postgres_user>:<postgres_password>@<db_url>/<db_name>)'"

- name: cpus
  value: "1"
  default: "1"
  editable: true
  required: false
  description: "CPUs per single worker (final one = cpus * num_workers)"

- name: memory
  value: "1"
  default: "1"
  editable: true
  required: false
  description: "RAM memory per single worker (final one = memory * num_workers)"

- name: langfuse_secret_key
  value: "sk-1234567890"
  default: "sk-1234567890"
  editable: true
  required: false
  description: "Langfuse secret key"

- name: langfuse_host
  value: "https://cloud.langfuse.com"
  default: "https://cloud.langfuse.com"
  editable: true
  required: false
  description: "Langfuse host"